<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adaptive Neon Habit Tracker</title>
    <style>
        :root {
            /* Стандартная тема (Purple) */
            --accent: #bc13fe;
            --bg-dark: #000000;
            --glass-bg: rgba(188, 19, 254, 0.05);
            --glass-border: rgba(188, 19, 254, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.8s ease;
        }

        #star-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            filter: blur(1px);
        }

        .container {
            padding: 20px;
            max-width: 480px;
            margin: 0 auto;
        }

        /* Адаптивная карточка */
        .glass-card {
            background: linear-gradient(135deg, var(--glass-bg), rgba(0, 0, 0, 0.6));
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            animation: liquid-float 6s ease-in-out infinite;
            transition: all 0.5s ease;
        }

        @keyframes liquid-float {
            0%, 100% { transform: translateY(0); border-radius: 35px 40px 35px 40px; }
            50% { transform: translateY(-8px); border-radius: 40px 35px 40px 35px; }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .theme-buttons { display: flex; gap: 15px; }
        .theme-btn {
            width: 35px; height: 35px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.4s;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .theme-btn.active-neon { border-color: #fff; box-shadow: 0 0 15px currentColor; transform: scale(1.1); }

        /* Элементы управления */
        .period-selector {
            display: flex;
            background: rgba(0, 0, 0, 0.4);
            padding: 5px;
            border-radius: 18px;
            margin-bottom: 25px;
            border: 1px solid var(--glass-border);
        }

        .period-selector span {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            border-radius: 14px;
            font-size: 0.8rem;
            cursor: pointer;
            color: rgba(255,255,255,0.3);
            transition: 0.3s;
        }

        .period-selector span.active {
            color: #fff;
            background: var(--glass-bg);
            box-shadow: 0 0 10px var(--accent);
            text-shadow: 0 0 5px #fff;
        }

        /* Инпуты */
        input[type="text"] {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--glass-border);
            color: white;
            padding: 10px;
            font-size: 1.1rem;
            width: 60%;
            transition: 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-bottom-color: var(--accent);
            text-shadow: 0 0 8px var(--accent);
        }

        /* Кольцо */
        #progress-bar {
            stroke: var(--accent);
            filter: drop-shadow(0 0 10px var(--accent));
        }
        .ring-text {
            text-shadow: 0 0 15px var(--accent);
            font-weight: 900;
        }

        /* Кнопки эмодзи */
        .emoji-group {
            display: flex;
            background: rgba(0,0,0,0.3);
            padding: 8px;
            border-radius: 20px;
            gap: 10px;
            border: 1px solid var(--glass-border);
        }

        .emoji-btn {
            font-size: 1.4rem;
            cursor: pointer;
            filter: grayscale(1) opacity(0.3);
            transition: 0.4s;
            background: transparent;
            border: none;
        }

        .emoji-btn.active {
            filter: grayscale(0) opacity(1);
            transform: scale(1.2);
            text-shadow: 0 0 15px var(--accent);
        }

        .btn-add {
            width: 100%;
            padding: 20px;
            border-radius: 25px;
            background: var(--bg-dark);
            color: #fff;
            border: 1px solid var(--accent);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .btn-add:hover {
            background: var(--accent);
            box-shadow: 0 0 30px var(--accent);
        }

        #lang {
            background: #000;
            color: #fff;
            border: 1px solid var(--glass-border);
            padding: 8px 15px;
            border-radius: 15px;
        }
    </style>
</head>
<body>

<canvas id="star-canvas"></canvas>

<div class="container">
    <div class="header">
        <div class="theme-buttons">
            <div class="theme-btn active-neon" style="background: #bc13fe; color: #bc13fe;" onclick="setTheme('purple', this)"></div>
            <div class="theme-btn" style="background: #ffffff; color: #ffffff;" onclick="setTheme('white', this)"></div>
            <div class="theme-btn" style="background: #00ff80; color: #00ff80;" onclick="setTheme('green', this)"></div>
        </div>
        <select id="lang" onchange="updateLang()">
            <option value="ru">RU</option>
            <option value="en">EN</option>
        </select>
    </div>

    <div class="glass-card">
        <div class="period-selector">
            <span class="active" onclick="setPeriod(this)">Неделя</span>
            <span onclick="setPeriod(this)">Месяц</span>
            <span onclick="setPeriod(this)">Полгода</span>
            <span onclick="setPeriod(this)">Год</span>
        </div>
        <div style="display: flex; align-items: center; justify-content: space-around;">
            <div style="position: relative; width: 130px; height: 130px;">
                <svg width="130" height="130" style="transform: rotate(-90deg);">
                    <circle r="55" cx="65" cy="65" fill="transparent" stroke="rgba(255,255,255,0.05)" stroke-width="12"></circle>
                    <circle id="progress-bar" r="55" cx="65" cy="65" fill="transparent" stroke-width="12" stroke-dasharray="345.5" stroke-dashoffset="345.5" stroke-linecap="round" style="transition: stroke-dashoffset 1s ease;"></circle>
                </svg>
                <div class="ring-text" id="perc-val" style="position: absolute; top:50%; left:50%; transform: translate(-50%, -50%); font-size: 1.5rem;">0%</div>
            </div>
            <div>
                <div id="goal-text" style="opacity: 0.3; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;">Status</div>
                <div id="status-text" style="font-weight: 900; font-size: 1.8rem;">0 / 0</div>
            </div>
        </div>
    </div>

    <div id="habit-list"></div>
    <button class="btn-add" onclick="addHabitRow()">+ Add New Habit</button>
</div>

<script>
    const canvas = document.getElementById('star-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    let currentAccent = '#bc13fe';

    class Star {
        constructor() {
            this.init();
        }
        init() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 1.5;
            this.speed = Math.random() * 0.05 + 0.01;
            this.color = Math.random() > 0.7 ? currentAccent : '#fff';
        }
        update() {
            this.y += this.speed;
            if (this.y > canvas.height) this.y = 0;
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function initStars() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = Array.from({length: 100}, () => new Star());
    }

    function animate() {
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => { s.update(); s.draw(); });
        requestAnimationFrame(animate);
    }

    // --- СМЕНА ТЕМЫ ---
    function setTheme(theme, btn) {
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active-neon'));
        btn.classList.add('active-neon');

        const root = document.documentElement;
        let accent, bg, glass, border;

        switch(theme) {
            case 'purple':
                accent = '#bc13fe'; bg = '#000000'; 
                glass = 'rgba(188, 19, 254, 0.07)'; border = 'rgba(188, 19, 254, 0.3)';
                break;
            case 'white':
                accent = '#ffffff'; bg = '#000000'; 
                glass = 'rgba(255, 255, 255, 0.05)'; border = 'rgba(255, 255, 255, 0.2)';
                break;
            case 'green':
                accent = '#00ff80'; bg = '#000000'; 
                glass = 'rgba(0, 255, 128, 0.07)'; border = 'rgba(0, 255, 128, 0.3)';
                break;
        }

        currentAccent = accent;
        root.style.setProperty('--accent', accent);
        root.style.setProperty('--bg-dark', bg);
        root.style.setProperty('--glass-bg', glass);
        root.style.setProperty('--glass-border', border);
        
        // Обновляем цвет звезд
        stars.forEach(s => s.color = Math.random() > 0.7 ? accent : '#fff');
    }

    function addHabitRow() {
        const row = document.createElement('div');
        row.className = 'habit-row glass-card';
        row.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <input type="text" placeholder="Habit name...">
                <input type="time" value="08:00" style="background:transparent; color:#fff; border:none; opacity:0.3;">
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                <div class="emoji-group">
                    <button class="emoji-btn" data-score="0" onclick="toggleHabit(this)">🙁</button>
                    <button class="emoji-btn" data-score="0.5" onclick="toggleHabit(this)">😐</button>
                    <button class="emoji-btn" data-score="1" onclick="toggleHabit(this)">😊</button>
                </div>
                <button onclick="removeRow(this)" style="background:none; border:none; color:rgba(255,255,255,0.1); cursor:pointer; font-size:1.5rem;">✕</button>
            </div>
        `;
        document.getElementById('habit-list').appendChild(row);
        calcProgress();
    }

    function removeRow(btn) {
        const row = btn.closest('.habit-row');
        row.style.opacity = '0';
        row.style.transform = 'translateX(20px)';
        setTimeout(() => { row.remove(); calcProgress(); }, 300);
    }

    function toggleHabit(btn) {
        const group = btn.parentElement;
        group.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        calcProgress();
    }

    function calcProgress() {
        const rows = document.querySelectorAll('.habit-row');
        const active = document.querySelectorAll('.emoji-btn.active');
        let score = 0;
        active.forEach(b => score += parseFloat(b.dataset.score));
        
        const total = rows.length;
        const target = total > 0 ? Math.round((score / total) * 100) : 0;
        
        document.getElementById('perc-val').innerText = target + "%";
        const circle = document.getElementById('progress-bar');
        const offset = 345.5 - (target / 100 * 345.5);
        circle.style.strokeDashoffset = offset;
        document.getElementById('status-text').innerText = `${active.length} / ${total}`;
    }

    function setPeriod(el) {
        document.querySelectorAll('.period-selector span').forEach(s => s.classList.remove('active'));
        el.classList.add('active');
    }

    function updateLang() {
        const isRu = document.getElementById('lang').value === 'ru';
        document.getElementById('goal-text').innerText = isRu ? 'Статус' : 'Status';
        document.querySelector('.btn-add').innerText = isRu ? '+ Новая привычка' : '+ Add New Habit';
    }

    initStars(); animate();
    addHabitRow();
</script>
</body>
</html>
